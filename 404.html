<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | 18 Gangster Museum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/booking.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem 6vw;
      background: var(--black);
    }
    .error-number {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      opacity: .15;
      margin-bottom: -2rem;
      user-select: none;
    }
    .error-page h1 {
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      margin-bottom: 1rem;
    }
    .error-page p {
      color: var(--mid-grey);
      max-width: 400px;
      margin: 0 auto 2rem;
    }
    .error-links {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    }
  </style>
</head>
<body>
<main class="error-page">
  <div class="error-number" aria-hidden="true">404</div>
  <h1>Page <span class="text-red">Not Found</span></h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="error-links">
    <a href="index.html" class="btn btn-red">Go to Homepage</a>
    <a href="pages/tours.html" class="btn btn-outline">Browse Tours</a>
    <a href="pages/contact.html" class="btn btn-outline">Contact Us</a>
  </div>
</main>
</body>
</html>
